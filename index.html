<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">
  <h1 class="title">To My Love 💖</h1>

  <p class="subtitle">
    From Bengal to Nepal, distance never mattered...
  </p>

  <button onclick="showMessage()">Tap Here ❤️</button>

  <div id="message" class="hidden">
    <p>
      You are not just my love...  
      You are my peace, my chaos, my everything.  
      No borders, no language, no distance can stop what I feel for you. 🌸  
    </p>

    <p class="final">
      I love you endlessly 💖
    </p>
  </div>
</div>

<canvas id="canvas"></canvas>

<script src="script.js"></script>
</body>
</html>
